<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Litpax — Store Stock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0d1f3c; --accent:#2558e8; --green:#16a34a; --red:#dc2626; --orange:#ea580c;
    --purple:#7c3aed; --bg:#f2f5fb; --card:#fff; --border:#e5e9f2; --muted:#6b7280;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;}

  /* ── STICKY HEADER ── */
  .hdr{position:sticky;top:0;z-index:10;background:rgba(242,245,251,.92);backdrop-filter:blur(8px);padding:14px 18px 10px;border-bottom:1px solid var(--border);}
  .top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;}
  .top h1{font-size:17px;font-weight:800;letter-spacing:-.3px;}
  .top h1 span{color:var(--accent);}
  .upd{font-size:10.5px;color:var(--muted);text-align:right;white-space:nowrap;}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s infinite;}
  .dot.err{background:var(--red);animation:none;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .tools{display:flex;gap:8px;align-items:center;}
  #search{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:9px;padding:8px 13px;font-family:'DM Sans';font-size:13px;color:var(--navy);outline:none;}
  #search:focus{border-color:var(--accent);}
  .refresh-btn{background:#fff;border:1.5px solid var(--border);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer;font-family:'DM Sans';white-space:nowrap;}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* ── CATEGORY CHIPS ── */
  .chips{display:flex;gap:7px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--navy);cursor:pointer;font-family:'DM Sans';white-space:nowrap;transition:all .12s;}
  .chip .n{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-left:4px;}
  .chip.active{background:var(--navy);border-color:var(--navy);color:#fff;}
  .chip.active .n{color:rgba(255,255,255,.6);}
  .chip.warn-chip{border-color:#fecaca;}
  .chip.warn-chip.active{background:var(--red);border-color:var(--red);}

  /* ── CONTENT ── */
  .wrap{padding:14px 18px 30px;}
  .cat-label{display:flex;align-items:center;gap:8px;margin:16px 2px 8px;}
  .cat-label:first-child{margin-top:2px;}
  .cat-label h2{font-size:13px;font-weight:700;}
  .cat-label .meta{font-size:11px;color:var(--muted);}
  .cat-label .line{flex:1;height:1px;background:var(--border);}

  /* ── DENSE TILE GRID ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;}
  .tile{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--green);border-radius:9px;padding:9px 11px 8px;display:flex;flex-direction:column;gap:3px;min-height:64px;}
  .tile.ro{border-left-color:var(--orange);}
  .tile.cr{border-left-color:var(--red);background:#fffafa;}
  .tile .name{font-size:12px;font-weight:600;line-height:1.25;color:var(--navy);}
  .tile .bottom{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto;}
  .tile .qty{font-family:var(--mono);font-size:19px;font-weight:800;line-height:1;}
  .tile .qty small{font-size:9.5px;font-weight:600;color:var(--muted);margin-left:2px;}
  .tile.ok .qty{color:var(--navy);}
  .tile.ro .qty{color:var(--orange);}
  .tile.cr .qty{color:var(--red);}
  .tile .wip{font-size:9.5px;font-weight:700;color:var(--purple);background:#f5f3ff;padding:2px 7px;border-radius:10px;}

  .empty{text-align:center;padding:50px 10px;color:var(--muted);font-size:13px;}
  .empty .ei{font-size:28px;margin-bottom:8px;}
  .loader{display:inline-block;width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:640px){
    .hdr{padding:10px 12px 8px;}
    .wrap{padding:10px 12px 24px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;}
    .tile{min-height:58px;padding:8px 9px 7px;}
    .tile .qty{font-size:17px;}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="hdr">
  <div class="top">
    <h1>Litpax <span>Store Stock</span></h1>
    <div class="upd">
      <div><span class="dot" id="dot"></span><span id="dot-lbl">Connecting…</span></div>
      <div id="last-upd">—</div>
    </div>
  </div>
  <div class="tools">
    <input id="search" placeholder="🔍 Item search karo…" oninput="render()">
    <button class="refresh-btn" onclick="loadStock()">↻</button>
  </div>
  <div class="chips" id="chips"></div>
</div>

<div class="wrap">
  <div id="content"><div class="empty"><span class="loader"></span><div style="margin-top:10px;">Stock load ho raha hai…</div></div></div>
</div>

<script>
// ═══ Same GAS URL as IMS app.js ═══
const API = 'https://script.google.com/macros/s/AKfycby2VJa8pHD443hbxK009Mc4sXepMu_ZK13cdN4WmUeeY6bFo1YmK-Eoe_4RQioJ8LpG/exec';

const CAT_ORDER = ['Cells','BMS','Charger','Nickel/Busbar','Box','Wire','Consumables','Tools','Packaging'];
const CAT_ICONS = {'Cells':'🔋','BMS':'⚡','Charger':'🔌','Nickel/Busbar':'🪙','Box':'📦','Wire':'🔩','Consumables':'🧰','Tools':'🔧','Packaging':'📦'};

let _stocks = [];
let _activeCat = ''; // '' = All, '__alert__' = sirf Critical/Reorder

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function sortCats(cats){
  return cats.sort((a,b)=>{
    const ai=CAT_ORDER.indexOf(a), bi=CAT_ORDER.indexOf(b);
    if(ai===-1&&bi===-1) return a.localeCompare(b);
    if(ai===-1) return 1; if(bi===-1) return -1;
    return ai-bi;
  });
}

async function loadStock(){
  document.getElementById('dot-lbl').textContent = 'Refreshing…';
  try{
    const r = await fetch(`${API}?action=getStockSummary`, { redirect:'follow' });
    const d = JSON.parse(await r.text());
    if (d.error) throw new Error(d.error);
    _stocks = d;
    renderChips();
    render();
    document.getElementById('dot').className = 'dot';
    document.getElementById('dot-lbl').textContent = 'Live';
    document.getElementById('last-upd').textContent =
      'Updated: ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  } catch(e){
    document.getElementById('dot').className = 'dot err';
    document.getElementById('dot-lbl').textContent = 'Error';
    document.getElementById('content').innerHTML =
      `<div class="empty"><div class="ei">❌</div>${esc(e.message)}<br><br><button class="refresh-btn" onclick="loadStock()">↻ Dobara Try Karo</button></div>`;
  }
}

function renderChips(){
  const cats = sortCats([...new Set(_stocks.map(s=>s.cat||'Other'))]);
  const alertCount = _stocks.filter(s=>s.status!=='OK').length;
  const el = document.getElementById('chips');
  let html = `<button class="chip ${_activeCat===''?'active':''}" onclick="setCat('')">All <span class="n">${_stocks.length}</span></button>`;
  if (alertCount > 0){
    html += `<button class="chip warn-chip ${_activeCat==='__alert__'?'active':''}" onclick="setCat('__alert__')">⚠ Alerts <span class="n">${alertCount}</span></button>`;
  }
  html += cats.map(c=>{
    const n = _stocks.filter(s=>(s.cat||'Other')===c).length;
    return `<button class="chip ${_activeCat===c?'active':''}" onclick="setCat('${c.replace(/'/g,"\\'")}')">${CAT_ICONS[c]||'📦'} ${esc(c)} <span class="n">${n}</span></button>`;
  }).join('');
  el.innerHTML = html;
}

function setCat(c){
  _activeCat = c;
  renderChips();
  render();
  window.scrollTo({top:0});
}

function tileHTML(s){
  const cls = s.status==='Critical'?'cr':s.status==='Reorder'?'ro':'ok';
  return `<div class="tile ${cls}">
    <div class="name">${esc(s.name)}</div>
    <div class="bottom">
      <span class="qty">${s.currentStock}<small>${esc(s.unit||'')}</small></span>
      ${(s.wip||0)>0 ? `<span class="wip">WIP ${s.wip}</span>` : ''}
    </div>
  </div>`;
}

function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const el = document.getElementById('content');

  let fl = _stocks.filter(s => !q || s.name.toLowerCase().includes(q));
  if (_activeCat === '__alert__')      fl = fl.filter(s=>s.status!=='OK');
  else if (_activeCat)                 fl = fl.filter(s=>(s.cat||'Other')===_activeCat);

  if (!fl.length){
    el.innerHTML = `<div class="empty"><div class="ei">📭</div>Koi item nahi mila</div>`;
    return;
  }

  // Single category ya alert view → seedha flat grid, koi header nahi
  if (_activeCat && _activeCat !== '__alert__'){
    el.innerHTML = `<div class="grid">${fl.sort((a,b)=>a.name.localeCompare(b.name)).map(tileHTML).join('')}</div>`;
    return;
  }
  if (_activeCat === '__alert__'){
    const sorted = fl.sort((a,b)=> (a.status==='Critical'?0:1)-(b.status==='Critical'?0:1) || a.name.localeCompare(b.name));
    el.innerHTML = `<div class="grid">${sorted.map(tileHTML).join('')}</div>`;
    return;
  }

  // All view → chhote category labels + grid sections
  const grouped = {};
  fl.forEach(s=>{ const c=s.cat||'Other'; (grouped[c]=grouped[c]||[]).push(s); });

  el.innerHTML = sortCats(Object.keys(grouped)).map(cat=>{
    const items = grouped[cat].sort((a,b)=>a.name.localeCompare(b.name));
    const alerts = items.filter(s=>s.status!=='OK').length;
    return `
      <div class="cat-label">
        <h2>${CAT_ICONS[cat]||'📦'} ${esc(cat)}</h2>
        <span class="meta">${items.length} items${alerts?` · <span style="color:var(--red);font-weight:700;">${alerts} alert</span>`:''}</span>
        <span class="line"></span>
      </div>
      <div class="grid">${items.map(tileHTML).join('')}</div>`;
  }).join('');
}

loadStock();
setInterval(loadStock, 5*60*1000); // auto-refresh 5 min
</script>
</body>
</html>
