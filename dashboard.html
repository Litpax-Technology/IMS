<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Litpax — Current Stock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0d1f3c; --accent:#2558e8; --green:#16a34a; --red:#dc2626; --orange:#ea580c;
    --purple:#7c3aed; --bg:#f2f5fb; --card:#fff; --border:#e5e9f2; --muted:#6b7280;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--navy);padding:18px;min-height:100vh;}

  .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
  .top h1{font-size:19px;font-weight:800;letter-spacing:-.3px;}
  .top h1 span{color:var(--accent);}
  .upd{font-size:11px;color:var(--muted);text-align:right;}
  .upd .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite;}
  .upd .dot.err{background:var(--red);animation:none;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .inp{background:#fff;border:1.5px solid var(--border);border-radius:9px;padding:9px 13px;font-family:'DM Sans';font-size:13px;color:var(--navy);outline:none;}
  .inp:focus{border-color:var(--accent);}
  #search{flex:1;min-width:180px;}
  .refresh-btn{background:#fff;border:1.5px solid var(--border);border-radius:9px;padding:9px 16px;font-family:'DM Sans';font-size:13px;font-weight:600;color:var(--navy);cursor:pointer;}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent);}

  .summary{font-size:12px;color:var(--muted);margin-bottom:12px;}

  .cat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
  .cat-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#f8faff;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
  .cat-head .l{display:flex;align-items:center;gap:8px;}
  .cat-head h2{font-size:14px;font-weight:700;}
  .cat-head .count{font-size:11px;color:var(--muted);}
  .cat-head .total{font-family:var(--mono);font-weight:800;font-size:14px;color:var(--accent);}
  .cat-head .arr{font-size:11px;color:var(--muted);margin-left:10px;}

  .item-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:10px;}
  .item-row:last-child{border-bottom:none;}
  .item-row:hover{background:#fafbff;}
  .iname{font-weight:600;font-size:13.5px;flex:1;min-width:0;}
  .iunit{font-size:11px;color:var(--muted);font-weight:400;}
  .qty{font-family:var(--mono);font-weight:800;font-size:17px;flex-shrink:0;text-align:right;}
  .qty small{font-size:10px;font-weight:500;color:var(--muted);}
  .st{font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0;min-width:66px;text-align:center;}
  .st.ok{background:#f0fdf4;color:var(--green);}
  .st.ro{background:#fff7ed;color:var(--orange);}
  .st.cr{background:#fef2f2;color:var(--red);}
  .wip{font-size:10px;color:var(--purple);font-weight:600;}

  .empty{text-align:center;padding:44px 10px;color:var(--muted);font-size:13px;}
  .empty .ei{font-size:28px;margin-bottom:8px;}
  .loader{display:inline-block;width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:560px){
    body{padding:12px;}
    .qty{font-size:15px;}
    .st{min-width:auto;padding:3px 7px;}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>

<div class="top">
  <h1>Litpax <span>Store Stock</span></h1>
  <div class="upd">
    <div><span class="dot" id="dot"></span><span id="dot-lbl">Connecting…</span></div>
    <div id="last-upd" style="margin-top:3px;">—</div>
  </div>
</div>

<div class="toolbar">
  <input class="inp" id="search" placeholder="🔍 Item search karo…" oninput="render()">
  <select class="inp" id="cat-f" onchange="render()"><option value="">All Categories</option></select>
  <button class="refresh-btn" onclick="loadStock()">↻ Refresh</button>
</div>

<div class="summary" id="summary"></div>
<div id="content"><div class="empty"><span class="loader"></span><div style="margin-top:10px;">Stock load ho raha hai…</div></div></div>

<script>
// ═══ Same GAS URL as IMS app.js ═══
const API = 'https://script.google.com/macros/s/AKfycby2VJa8pHD443hbxK009Mc4sXepMu_ZK13cdN4WmUeeY6bFo1YmK-Eoe_4RQioJ8LpG/exec';

const CAT_ORDER = ['Cells','BMS','Charger','Nickel/Busbar','Box','Wire','Consumables','Tools','Packaging'];
const CAT_ICONS = {'Cells':'🔋','BMS':'⚡','Charger':'🔌','Nickel/Busbar':'🪙','Box':'📦','Wire':'🔩','Consumables':'🧰','Tools':'🔧','Packaging':'📦'};

let _stocks = [];
let _openCats = {}; // sab default open

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadStock(){
  document.getElementById('dot-lbl').textContent = 'Refreshing…';
  try{
    const r = await fetch(`${API}?action=getStockSummary`, { redirect:'follow' });
    const d = JSON.parse(await r.text());
    if (d.error) throw new Error(d.error);
    _stocks = d;

    // category filter dropdown fill (ek baar)
    const sel = document.getElementById('cat-f');
    if (sel.options.length <= 1){
      const cats = [...new Set(_stocks.map(s=>s.cat||'Other'))].sort((a,b)=>{
        const ai=CAT_ORDER.indexOf(a), bi=CAT_ORDER.indexOf(b);
        if(ai===-1&&bi===-1) return a.localeCompare(b);
        if(ai===-1) return 1; if(bi===-1) return -1;
        return ai-bi;
      });
      cats.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
    }

    render();
    document.getElementById('dot').className = 'dot';
    document.getElementById('dot-lbl').textContent = 'Live';
    document.getElementById('last-upd').textContent =
      'Updated: ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  } catch(e){
    document.getElementById('dot').className = 'dot err';
    document.getElementById('dot-lbl').textContent = 'Error';
    document.getElementById('content').innerHTML =
      `<div class="empty"><div class="ei">❌</div>${esc(e.message)}<br><br><button class="refresh-btn" onclick="loadStock()">↻ Dobara Try Karo</button></div>`;
  }
}

function render(){
  const q  = document.getElementById('search').value.toLowerCase();
  const cf = document.getElementById('cat-f').value;
  const el = document.getElementById('content');

  const fl = _stocks.filter(s =>
    (!q  || s.name.toLowerCase().includes(q)) &&
    (!cf || (s.cat||'Other') === cf)
  );

  document.getElementById('summary').textContent =
    fl.length ? `${fl.length} items` + (q||cf ? ` (filtered from ${_stocks.length})` : '') : '';

  if (!fl.length){
    el.innerHTML = `<div class="empty"><div class="ei">📭</div>Koi item nahi mila</div>`;
    return;
  }

  // category-wise group
  const grouped = {};
  fl.forEach(s=>{
    const c = s.cat || 'Other';
    if (!grouped[c]) grouped[c] = [];
    grouped[c].push(s);
  });

  const cats = Object.keys(grouped).sort((a,b)=>{
    const ai=CAT_ORDER.indexOf(a), bi=CAT_ORDER.indexOf(b);
    if(ai===-1&&bi===-1) return a.localeCompare(b);
    if(ai===-1) return 1; if(bi===-1) return -1;
    return ai-bi;
  });

  el.innerHTML = cats.map(cat=>{
    const items = grouped[cat].sort((a,b)=>a.name.localeCompare(b.name));
    const total = items.reduce((s,i)=>s+(i.currentStock||0),0);
    const unit  = items[0] ? (items[0].unit||'') : '';
    const isOpen = _openCats[cat] !== false; // default open
    return `
    <div class="cat-card">
      <div class="cat-head" onclick="toggleCat('${cat.replace(/'/g,"\\'")}')">
        <div class="l">
          <span>${CAT_ICONS[cat]||'📦'}</span>
          <h2>${esc(cat)}</h2>
          <span class="count">${items.length} items</span>
        </div>
        <div>
          <span class="total">${total} <small style="font-size:10px;font-weight:500;color:var(--muted)">${esc(unit)}</small></span>
          <span class="arr">${isOpen?'▲':'▼'}</span>
        </div>
      </div>
      <div style="display:${isOpen?'block':'none'};">
        ${items.map(s=>{
          const stCls = s.status==='Critical'?'cr':s.status==='Reorder'?'ro':'ok';
          const stTxt = s.status==='Critical'?'CRITICAL':s.status==='Reorder'?'REORDER':'OK';
          const qColor = s.status==='Critical'?'var(--red)':s.status==='Reorder'?'var(--orange)':'var(--navy)';
          return `<div class="item-row">
            <div class="iname">${esc(s.name)} <span class="iunit">${esc(s.unit||'')}</span>
              ${(s.wip||0)>0 ? `<div class="wip">🏭 WIP: ${s.wip}</div>` : ''}
            </div>
            <span class="st ${stCls}">${stTxt}</span>
            <span class="qty" style="color:${qColor}">${s.currentStock}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleCat(cat){
  _openCats[cat] = _openCats[cat] === false ? true : false;
  render();
}

loadStock();
setInterval(loadStock, 5*60*1000); // auto-refresh 5 min
</script>
</body>
</html>
